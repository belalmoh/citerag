version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: citerag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: citerag
      POSTGRES_PASSWORD: citerag
      POSTGRES_DB: citerag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: citerag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: citerag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
  qdrantdata:
